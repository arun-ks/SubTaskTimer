<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activity Checklist</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #6d28d9;
      --accent-soft: #ede9fe;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 160px);
      min-height: 100vh;
    }

    .wrap {
      max-width: 880px;
      margin: 24px auto 32px;
      padding: 0 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: #fcfcff;
    }

    .activity-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    select {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
      min-width: 150px;
      outline: none;
    }

    select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-reset {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-reset:hover {
      background: #fecaca;
    }

    .content {
      padding: 16px 20px 22px;
    }

    .group {
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .group-title {
      margin: 0;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      background: var(--accent-soft);
      color: #4c1d95;
      border-bottom: 1px solid #ddd6fe;
    }

    .items {
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      background: #fff;
    }

    .item {
      display: flex;
      gap: 10px;
      align-items: center;
      border-radius: 8px;
      padding: 7px 8px;
    }

    .item:hover {
      background: #f9fafb;
    }

    .item input[type="checkbox"] {
      transform: translateY(-1px);
      accent-color: var(--accent);
    }

    .empty {
      padding: 20px 0 4px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 560px) {
      .toolbar {
        flex-wrap: wrap;
      }

      .toolbar-actions {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="panel">
      <section class="toolbar">
        <label class="activity-picker" for="activitySelect">
          Activity:
          <select id="activitySelect"></select>
        </label>
        <div class="toolbar-actions">
          <label class="toggle" for="showUncheckedOnly">
            <input id="showUncheckedOnly" type="checkbox">Show only unchecked
          </label>
          <button id="resetBtn" class="btn btn-reset" type="button">Reset All</button>
        </div>
      </section>

      <section class="content" id="checklistContainer"></section>
    </main>
  </div>
  
  <script type="text/javascript" src="travelChecklistGenerated.js"></script>
  <script>
  	
    const checklistDataFixed = [
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"SPORTS Tshirt" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"SPORTS Short with big pockets" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"SPORTS Underwear" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"SPORTS SOCKS" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"SPORTS SHOES" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"Water Bottle" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"Paddle/Racket" },
      { "activity":"Pickleball", "Grouping":"For On Court",          "item":"Balls/Shuttlecock" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"Spare TShirt" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"Spare Shorts" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"Slippers" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"Bags for Dirty Clothes" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"Bags for Slippers/Shoes" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"Bag for Office Clothes" },
      { "activity":"Pickleball", "Grouping":"After Game",            "item":"BIG Towel" },  

      { "activity":"Hiking",     "Grouping":"Nutrition",            "item":"100+ bottle" },
      { "activity":"Hiking",     "Grouping":"Nutrition",            "item":"Cold water in Can" },
      { "activity":"Hiking",     "Grouping":"Nutrition",            "item":"Cold water in Water-Bag" },
      { "activity":"Hiking",     "Grouping":"Nutrition",            "item":"Bananas" },
      { "activity":"Hiking",     "Grouping":"Nutrition",            "item":"Energy bar" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Gloves" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Hiking Shoes" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Hiking Socks" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Mask & Spare" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Poncho" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Whistle" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Mobile" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Anti-Mosquito Spray" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Cap" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Gym Towel" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Waterproof bag for Mobile" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"Plastic bags for emergency" },
      { "activity":"Hiking",     "Grouping":"Gear",                 "item":"20 RM Cash" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"2 garbage bags for shoes & Clothes" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"Water for Washing" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"Towels" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"T-Shirt to change" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"Shorts & Underwear to Change" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"Mask II" },
      { "activity":"Hiking",     "Grouping":"Post Hiking",          "item":"Wallet" },     
        
    ];                                                                                                 
    
    const checklistData = [...checklistDataFixed, ...checklistDataTravel];
   

    const activitySelect = document.getElementById("activitySelect");
    const checklistContainer = document.getElementById("checklistContainer");
    const resetBtn = document.getElementById("resetBtn");
    const showUncheckedOnly = document.getElementById("showUncheckedOnly");

    const activities = [...new Set(checklistData.map(x => x.activity))];
    const groupedByActivity = checklistData.reduce((acc, row) => {
      if (!acc[row.activity]) acc[row.activity] = [];
      acc[row.activity].push(row);
      return acc;
    }, {});

    function getStorageKey(activity) {
      return "checklistState::" + encodeURIComponent(activity);
    }

    function makeItemKey(group, item) {
      return group + "||" + item;
    }

    function loadState(activity) {
      try {
        const raw = localStorage.getItem(getStorageKey(activity));
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }

    function saveState(activity, state) {
      localStorage.setItem(getStorageKey(activity), JSON.stringify(state));
    }

    function getInitialActivity() {
      const params = new URLSearchParams(window.location.search);
      const paramActivity = params.get("activity");
      if (paramActivity && activities.includes(paramActivity)) return paramActivity;
      return activities[0];
    }

    function updateUrl(activity) {
      const url = new URL(window.location.href);
      url.searchParams.set("activity", activity);
      history.replaceState(null, "", url.toString());
    }

    function updatePageTitle(activity) {
      document.title = activity + " Checklist";
    }

    function renderActivities(selected) {
      activitySelect.innerHTML = "";
      activities.forEach((activity) => {
        const option = document.createElement("option");
        option.value = activity;
        option.textContent = activity;
        option.selected = activity === selected;
        activitySelect.appendChild(option);
      });
    }

    function renderChecklist(activity) {
      const rows = groupedByActivity[activity] || [];
      checklistContainer.innerHTML = "";

      if (rows.length === 0) {
        checklistContainer.innerHTML = '<p class="empty">No checklist items for this activity.</p>';
        return;
      }

      const state = loadState(activity);
      const groups = rows.reduce((acc, row) => {
        if (!acc[row.Grouping]) acc[row.Grouping] = [];
        acc[row.Grouping].push(row.item);
        return acc;
      }, {});

      Object.keys(groups).forEach((groupName) => {
        const visibleItems = groups[groupName].filter((itemName) => {
          const key = makeItemKey(groupName, itemName);
          if (!showUncheckedOnly.checked) return true;
          return !Boolean(state[key]);
        });

        if (visibleItems.length === 0) return;

        const groupEl = document.createElement("article");
        groupEl.className = "group";

        const titleEl = document.createElement("h2");
        titleEl.className = "group-title";
        titleEl.textContent = groupName;
        groupEl.appendChild(titleEl);

        const itemsEl = document.createElement("div");
        itemsEl.className = "items";

        visibleItems.forEach((itemName) => {
          const key = makeItemKey(groupName, itemName);

          const label = document.createElement("label");
          label.className = "item";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = Boolean(state[key]);
          checkbox.addEventListener("change", () => {
            const latest = loadState(activity);
            latest[key] = checkbox.checked;
            saveState(activity, latest);
            if (showUncheckedOnly.checked) {
              renderChecklist(activity);
            }
          });

          const text = document.createElement("span");
          text.textContent = itemName;

          label.appendChild(checkbox);
          label.appendChild(text);
          itemsEl.appendChild(label);
        });

        groupEl.appendChild(itemsEl);
        checklistContainer.appendChild(groupEl);
      });

      if (checklistContainer.children.length === 0) {
        checklistContainer.innerHTML = '<p class="empty">All items are checked !!</p>';
      }
    }

    function setActivity(activity) {
      renderActivities(activity);
      renderChecklist(activity);
      updateUrl(activity);
      updatePageTitle(activity);
    }

    activitySelect.addEventListener("change", () => {
      setActivity(activitySelect.value);
    });

    showUncheckedOnly.addEventListener("change", () => {
      renderChecklist(activitySelect.value);
    });

    resetBtn.addEventListener("click", () => {
      const currentActivity = activitySelect.value;
      localStorage.removeItem(getStorageKey(currentActivity));
      renderChecklist(currentActivity);
    });

    setActivity(getInitialActivity());
  </script>
</body>
</html>
